<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#121212">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="https://valdlabs.com/meteor/icons/apple-touch-icon.png">
<title>Meteor dB</title>
<style>
  @font-face {
    font-family: '04b09';
    src: url('https://valdlabs.com/meteor/04B_09.TTF') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: block;
  }

  :root {
    --bg: #121212;
    --fg: #ffffff;
    --olive: #728810;
    --lime: #D3FF0D;
    --lime-dim: rgba(211, 255, 13, 0.5);
    --lime-trace: rgba(211, 255, 13, 0.09);
    --lime-glow: rgba(211, 255, 13, 0.15);
    --orange: #FF820D;
    --red: #FF350D;
    --muted: rgba(255,255,255,0.5);
  }
  * { box-sizing: border-box; image-rendering: pixelated; }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: '04b09', monospace;
    -webkit-font-smoothing: none;
    font-smooth: never;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    background: radial-gradient(circle at 50% 50%, rgba(211,255,13,0.04), transparent 70%), var(--bg);
    display: grid;
    grid-template-rows: auto 1fr auto auto;
    gap: 0;
    padding: 2vmin 2.5vmin calc(1.5vmin + env(safe-area-inset-bottom));
  }

  /* ===== Top bar ===== */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 2vmin;
  }
  .brand { display: flex; flex-direction: column; gap: 1vmin; }
  .brand img.logo { height: clamp(40px, 7vmin, 90px); width: auto; }
  .tagline {
    color: var(--olive);
    font-size: clamp(8px, 1.1vmin, 14px);
    letter-spacing: 0.05em;
    line-height: 1.2;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 1vmin;
    align-items: center;
    justify-content: flex-end;
  }
  .pill, .iconbtn {
    font-family: '04b09', monospace;
    font-size: clamp(10px, 1.6vmin, 18px);
    color: #fff;
    background: var(--lime-glow);
    border: 1px solid var(--lime);
    border-radius: 999px;
    padding: 1.2vmin 2.2vmin;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    line-height: 1;
    min-height: 4.5vmin;
  }
  .iconbtn { background: transparent; border-color: rgba(255,255,255,0.25); color: var(--fg); }
  .iconbtn.danger { border-color: var(--red); color: var(--red); }
  .pill:active, .iconbtn:active { transform: translateY(1px); }
  .pill:disabled, .iconbtn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ===== Center stage ===== */
  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3vmin;
    padding: 2vmin 0;
    min-height: 0;
  }
  .bignum {
    color: var(--lime);
    font-size: clamp(120px, 32vmin, 380px);
    line-height: 0.85;
    letter-spacing: -0.02em;
    text-shadow: 0 4px 17px rgba(0,0,0,0.9);
    white-space: nowrap;
  }
  .bignum .dB {
    font-size: 0.6em;
    letter-spacing: 0;
    margin-left: 0.05em;
  }

  /* Stats row: two blocks split by vertical line */
  .stats {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 2vmin;
    width: min(90%, 700px);
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5vmin;
  }
  .stat .row1 {
    font-size: clamp(14px, 2.4vmin, 28px);
    display: flex;
    gap: 0.8em;
    letter-spacing: 0.05em;
  }
  .stat .row1 .label { color: var(--orange); }
  .stat.right .row1 .label { color: var(--red); }
  .stat .row1 .sub { color: var(--lime-dim); }
  .stat .row2 {
    font-size: clamp(14px, 2.4vmin, 28px);
    color: #fff;
    letter-spacing: 0.05em;
  }
  .stats .divider {
    width: 1px;
    height: 80%;
    background: var(--lime);
  }

  /* ===== Bar meter ===== */
  .meter {
    display: flex;
    flex-direction: column;
    gap: 1vmin;
    padding: 1vmin 0 0;
  }
  .bars {
    display: flex;
    gap: clamp(2px, 0.3vmin, 4px);
    height: clamp(60px, 14vmin, 140px);
    align-items: flex-end;
    width: 100%;
  }
  .bar {
    flex: 1 1 0;
    min-width: 2px;
    background: var(--lime-trace);
    border-radius: 100px;
    height: 25%;
    transition: height 0.15s linear, background 0.15s linear;
  }
  .bar.active { background: var(--lime); }
  .bar.warn   { background: var(--orange); }
  .bar.danger { background: var(--red); }

  .meter-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: clamp(10px, 1.4vmin, 16px);
  }
  .meter-label .title { color: #fff; letter-spacing: 0.1em; }
  .meter-label .units { color: var(--red); letter-spacing: 0.1em; }

  /* ===== Footer ===== */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 1vmin;
  }
  .status {
    font-size: clamp(8px, 1vmin, 12px);
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .valdmark { display: flex; align-items: center; gap: 1vmin; }
  .valdmark img { height: clamp(12px, 1.6vmin, 22px); width: auto; }
  .valdmark .arrow { color: var(--lime); font-size: clamp(10px, 1.6vmin, 18px); letter-spacing: 0.1em; }

  /* Start overlay */
  .start-veil {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3vmin;
    z-index: 100;
  }
  .start-veil.hidden { display: none; }
  .start-veil button {
    font-family: '04b09', monospace;
    font-size: clamp(20px, 4vmin, 48px);
    color: #000;
    background: var(--lime);
    border: 0;
    border-radius: 999px;
    padding: 3vmin 6vmin;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .start-veil p {
    color: var(--muted);
    max-width: 80vw;
    text-align: center;
    font-size: clamp(10px, 1.6vmin, 18px);
    letter-spacing: 0.05em;
  }

  /* Forced orientation: rotate viewport */
  body.force-landscape .stage,
  body.force-portrait .stage { transform-origin: center; }
  /* Pure CSS reorientation is limited; rely on user device rotation + this class for visual hint */
  body.force-landscape { /* no-op visual hint */ }
  body.force-portrait { /* no-op visual hint */ }
</style>
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <img class="logo" src="https://valdlabs.com/meteor/meteorlogo.svg" alt="METEOR">
    </div>
    <div class="controls">
      <button class="pill" id="orientBtn">PORTRAIT</button>
      <button class="pill" id="avgBtn">AVG: 5S</button>
      <button class="iconbtn" id="pauseBtn">PAUSE</button>
      <button class="iconbtn danger" id="resetBtn">RESET</button>
    </div>
  </header>

  <main class="stage">
    <div class="bignum" id="bignum">--<span class="dB">dB</span></div>
    <div class="stats">
      <div class="stat left">
        <div class="row1"><span class="label">NOW</span><span class="sub">PEAK</span></div>
        <div class="row2"><span id="nowVal">--</span> <span id="peakVal" style="color:var(--lime-dim)">--</span></div>
      </div>
      <div class="divider"></div>
      <div class="stat right">
        <div class="row1"><span class="label">AVG</span><span class="sub">MAX</span></div>
        <div class="row2"><span id="avgVal">--</span> <span id="maxVal" style="color:var(--lime-dim)">--</span></div>
      </div>
    </div>
  </main>

  <section class="meter">
    <div class="bars" id="bars"></div>
    <div class="meter-label">
      <span class="title">DBA RECORDING — 1 BAR / MINUTE — LAST 60 MIN</span>
      <span class="units">LIVE</span>
    </div>
  </section>

  <footer class="footer">
    <div class="status" id="status">Tap START to grant mic and begin.</div>
    <div class="valdmark">
      <span class="arrow">designed with love by </span>
      <img src="https://valdlabs.com/meteor/valdlogo.svg" alt="VÅLD LABS METEOR">
    </div>
  </footer>

  <div class="start-veil" id="startVeil">
    <button id="startBtn">START</button>
    <p>Requires microphone access. Tap START to begin metering and keep screen awake.</p>
  </div>

<script>
(() => {
  // ===== Config =====
  const SPL_OFFSET = 90;        // dBFS -> approx dB SPL
  const UI_REFRESH_MS = 100;    // 0.5s display refresh
  const BAR_COUNT = 60;         // 60 bars
  const BAR_PERIOD_MS = 60_000; // 1 bar per minute
  const AVG_STEPS = [0, 1, 5, 10, 30, 60]; // seconds
  const ORIENT_MODES = ['AUTO', 'LANDSCAPE', 'PORTRAIT'];

  // ===== Elements =====
  const bignumEl  = document.getElementById('bignum');
  const nowEl     = document.getElementById('nowVal');
  const peakEl    = document.getElementById('peakVal');
  const avgEl     = document.getElementById('avgVal');
  const maxEl     = document.getElementById('maxVal');
  const barsEl    = document.getElementById('bars');
  const orientBtn = document.getElementById('orientBtn');
  const avgBtn    = document.getElementById('avgBtn');
  const pauseBtn  = document.getElementById('pauseBtn');
  const resetBtn  = document.getElementById('resetBtn');
  const startBtn  = document.getElementById('startBtn');
  const startVeil = document.getElementById('startVeil');
  const statusEl  = document.getElementById('status');

  // ===== State =====
  let audioCtx = null, analyser = null, micStream = null, buf = null;
  let rafId = null;
  let running = false, paused = false;

  let currentSPL = 0;             // instantaneous SPL
  let sessionPeak = 0;            // since start (or reset)
  let sessionMax = 0;             // alias for max all-time
  const history = [];             // {t,v} short-window samples for avg
  let avgIdx = 1;                 // index into AVG_STEPS (default 5s)
  let windowSec = AVG_STEPS[avgIdx];

  // Bar buffer: array of {peak, sum, count} for each minute slot
  let bars = [];                  // newest at end
  let currentBar = newBar();
  let barStartTime = 0;
  let wakeLock = null;
  let orientIdx = 0;
  let lastUIRefresh = 0;

  function newBar() { return { peak: 0, sum: 0, count: 0 }; }

  // ===== Build bar DOM once =====
  function initBars() {
    barsEl.innerHTML = '';
    for (let i = 0; i < BAR_COUNT; i++) {
      const d = document.createElement('div');
      d.className = 'bar';
      barsEl.appendChild(d);
    }
  }

  function zoneClass(db) {
    if (db >= 95) return 'danger';
    if (db >= 70) return 'warn';
    return 'active';
  }

  function dbToHeightPct(db) {
    // Map 30..120 dB -> 8%..100%
    const pct = ((db - 30) / 90) * 100;
    return Math.max(8, Math.min(100, pct));
  }

  function renderBars() {
    const nodes = barsEl.children;
    // bars[] holds up to BAR_COUNT; right-aligned. Pad left with empty slots.
    const pad = BAR_COUNT - bars.length - 1; // -1 for currentBar (live)
    for (let i = 0; i < BAR_COUNT; i++) {
      const n = nodes[i];
      let bar = null;
      if (i < pad) {
        bar = null;
      } else if (i === BAR_COUNT - 1) {
        bar = currentBar;
      } else {
        bar = bars[i - pad];
      }
      if (!bar || (bar.count === 0 && bar.peak === 0)) {
        n.className = 'bar';
        n.style.height = '25%';
      } else {
        const peak = bar.peak;
        n.className = 'bar ' + zoneClass(peak);
        n.style.height = dbToHeightPct(peak) + '%';
      }
    }
  }

  // ===== Audio =====
  async function start() {
    try {
      micStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation:false, noiseSuppression:false, autoGainControl:false, channelCount:1 }
      });
    } catch (e) {
      statusEl.textContent = 'Mic denied: ' + e.message;
      return false;
    }
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    const src = audioCtx.createMediaStreamSource(micStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0;
    src.connect(analyser);
    buf = new Float32Array(analyser.fftSize);

    await requestWakeLock();
    running = true; paused = false;
    barStartTime = performance.now();
    currentBar = newBar();
    bars = [];
    sessionPeak = 0; sessionMax = 0;
    history.length = 0;
    statusEl.textContent = 'RECORDING';
    pauseBtn.textContent = 'PAUSE';
    loop();
    return true;
  }

  function stopAudio() {
    if (rafId) cancelAnimationFrame(rafId); rafId = null;
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (audioCtx) { audioCtx.close().catch(()=>{}); audioCtx = null; }
    analyser = null; buf = null;
    releaseWakeLock();
  }

  function loop() {
    if (!running) return;
    if (!paused) {
      analyser.getFloatTimeDomainData(buf);
      let s = 0;
      for (let i = 0; i < buf.length; i++) s += buf[i] * buf[i];
      const rms = Math.sqrt(s / buf.length);
      const dBFS = 20 * Math.log10(Math.max(rms, 1e-7));
      const spl = Math.max(0, dBFS + SPL_OFFSET);
      currentSPL = spl;
      if (spl > sessionPeak) sessionPeak = spl;
      if (spl > sessionMax)  sessionMax  = spl;

      const now = performance.now();
      const ts = now / 1000;
      history.push({ t: ts, v: spl });
      const cutoff = ts - 61;
      while (history.length && history[0].t < cutoff) history.shift();

      // Update current minute-bar (peak + running avg)
      if (spl > currentBar.peak) currentBar.peak = spl;
      currentBar.sum += spl;
      currentBar.count++;

      // Roll bar every BAR_PERIOD_MS
      if (now - barStartTime >= BAR_PERIOD_MS) {
        bars.push(currentBar);
        if (bars.length > BAR_COUNT - 1) bars.shift();
        currentBar = newBar();
        barStartTime = now;
      }

      // Throttled UI refresh
      if (now - lastUIRefresh >= UI_REFRESH_MS) {
        lastUIRefresh = now;
        refreshUI();
      }
    }
    rafId = requestAnimationFrame(loop);
  }

  function computeAvg() {
    if (windowSec === 0) return currentSPL;
    const now = performance.now() / 1000;
    const cut = now - windowSec;
    let s = 0, n = 0;
    for (let i = history.length - 1; i >= 0; i--) {
      if (history[i].t < cut) break;
      s += history[i].v; n++;
    }
    return n > 0 ? s / n : currentSPL;
  }

  function refreshUI() {
    bignumEl.innerHTML = currentSPL.toFixed(0) + '<span class="dB">dB</span>';
    bignumEl.style.color = currentSPL >= 95 ? 'var(--red)' : currentSPL >= 70 ? 'var(--orange)' : 'var(--lime)';
    nowEl.textContent  = currentSPL.toFixed(0);
    peakEl.textContent = sessionPeak.toFixed(0);
    avgEl.textContent  = computeAvg().toFixed(0);
    maxEl.textContent  = sessionMax.toFixed(0);
    renderBars();
  }

  // ===== Wake lock =====
  async function requestWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    } catch (e) {
      // ignore; surface only if user reports
    }
  }
  function releaseWakeLock() { if (wakeLock) { wakeLock.release().catch(()=>{}); wakeLock = null; } }
  document.addEventListener('visibilitychange', async () => {
    if (running && !paused && document.visibilityState === 'visible' && !wakeLock) await requestWakeLock();
  });

  // ===== Controls =====
  orientBtn.addEventListener('click', () => {
    orientIdx = (orientIdx + 1) % ORIENT_MODES.length;
    const m = ORIENT_MODES[orientIdx];
    document.body.classList.remove('force-landscape','force-portrait');
    if (m === 'LANDSCAPE') document.body.classList.add('force-landscape');
    if (m === 'PORTRAIT')  document.body.classList.add('force-portrait');
    orientBtn.textContent = m;
    if ('orientation' in screen && screen.orientation.lock) {
      const target = m === 'LANDSCAPE' ? 'landscape' : m === 'PORTRAIT' ? 'portrait' : null;
      if (target) screen.orientation.lock(target).catch(()=>{});
      else if (screen.orientation.unlock) screen.orientation.unlock();
    }
  });

  avgBtn.addEventListener('click', () => {
    avgIdx = (avgIdx + 1) % AVG_STEPS.length;
    windowSec = AVG_STEPS[avgIdx];
    avgBtn.textContent = 'AVG: ' + (windowSec === 0 ? 'LIVE' : windowSec + 'S');
  });

  pauseBtn.addEventListener('click', () => {
    if (!running) return;
    paused = !paused;
    pauseBtn.textContent = paused ? 'RESUME' : 'PAUSE';
    statusEl.textContent = paused ? 'PAUSED' : 'RECORDING';
    if (paused) releaseWakeLock(); else requestWakeLock();
  });

  resetBtn.addEventListener('click', () => {
    bars = []; currentBar = newBar();
    barStartTime = performance.now();
    sessionPeak = 0; sessionMax = 0; currentSPL = 0;
    history.length = 0;
    refreshUI();
  });

  startBtn.addEventListener('click', async () => {
    startBtn.disabled = true;
    const ok = await start();
    startBtn.disabled = false;
    if (ok) startVeil.classList.add('hidden');
  });

  // ===== Init =====
  initBars();
  avgBtn.textContent = 'AVG: ' + (windowSec === 0 ? 'LIVE' : windowSec + 'S');
  orientBtn.textContent = ORIENT_MODES[orientIdx];

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
  }
})();
</script>
</body>
</html>
